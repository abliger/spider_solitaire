<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2d8a4e"/>
      <stop offset="100%" stop-color="#164a26"/>
    </linearGradient>
    <filter id="shadow" x="-15%" y="-15%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- 圆角背景 -->
  <rect width="128" height="128" rx="28" ry="28" fill="url(#bg)"/>

  <!-- 左侧牌背（向左倾斜） -->
  <g transform="rotate(-14, 64, 68)">
    <rect x="20" y="18" width="52" height="76" rx="6" fill="#0c1f3d" filter="url(#shadow)"/>
    <rect x="24" y="22" width="44" height="68" rx="4" fill="none" stroke="#1a3d6e" stroke-width="1.5"/>
    <path d="M 28 26 L 64 26 L 64 86 L 28 86 Z" fill="none" stroke="#142d52" stroke-width="1" stroke-dasharray="3 2" opacity="0.6"/>
  </g>

  <!-- 右侧牌背（向右倾斜） -->
  <g transform="rotate(14, 64, 68)">
    <rect x="56" y="18" width="52" height="76" rx="6" fill="#0c1f3d" filter="url(#shadow)"/>
    <rect x="60" y="22" width="44" height="68" rx="4" fill="none" stroke="#1a3d6e" stroke-width="1.5"/>
    <path d="M 64 26 L 100 26 L 100 86 L 64 86 Z" fill="none" stroke="#142d52" stroke-width="1" stroke-dasharray="3 2" opacity="0.6"/>
  </g>

  <!-- 中心主牌（正面） -->
  <rect x="30" y="20" width="68" height="92" rx="8" fill="#ffffff" filter="url(#shadow)"/>

  <!-- 左上角 ♠ -->
  <text x="38" y="42" font-family="Georgia, 'Times New Roman', serif" font-size="18" fill="#1a1a1a">♠</text>

  <!-- 右下角倒 ♠ -->
  <g transform="rotate(180, 90, 96)">
    <text x="82" y="90" font-family="Georgia, 'Times New Roman', serif" font-size="18" fill="#1a1a1a">♠</text>
  </g>

  <!-- ===== 中心蜘蛛图案 ===== -->
  <!-- 左侧4条腿 -->
  <path d="M 58 48 Q 48 38, 40 36" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <path d="M 56 54 Q 44 48, 36 50" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <path d="M 56 62 Q 44 68, 36 70" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <path d="M 58 68 Q 48 78, 40 82" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <!-- 右侧4条腿 -->
  <path d="M 70 48 Q 80 38, 88 36" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <path d="M 72 54 Q 84 48, 92 50" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <path d="M 72 62 Q 84 68, 92 70" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <path d="M 70 68 Q 80 78, 88 82" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <!-- 头胸部 -->
  <ellipse cx="64" cy="54" rx="8" ry="7" fill="#1a1a1a"/>
  <!-- 腹部 -->
  <ellipse cx="64" cy="68" rx="9" ry="11" fill="#1a1a1a"/>
  <!-- 腹部纹理条纹 -->
  <path d="M 58 64 Q 64 66, 70 64" stroke="#2a2a2a" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M 57 70 Q 64 72, 71 70" stroke="#2a2a2a" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M 59 76 Q 64 78, 69 76" stroke="#2a2a2a" stroke-width="1" fill="none" opacity="0.5"/>
  <!-- 眼睛 -->
  <circle cx="61" cy="52" r="1.5" fill="#e74c3c"/>
  <circle cx="67" cy="52" r="1.5" fill="#e74c3c"/>
</svg>
