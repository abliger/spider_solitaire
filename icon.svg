<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a5c2e"/>
      <stop offset="100%" stop-color="#0d3318"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>
  <!-- 背景圆角矩形 -->
  <rect x="4" y="4" width="120" height="120" rx="20" ry="20" fill="url(#bgGrad)" filter="url(#shadow)"/>
  <!-- 金色边框 -->
  <rect x="10" y="10" width="108" height="108" rx="14" ry="14" fill="none" stroke="#e8c84a" stroke-width="3"/>
  <!-- 中心 ♠ 符号 -->
  <text x="64" y="92" font-family="Georgia, 'Times New Roman', serif" font-size="80" font-weight="bold" fill="#ffffff" text-anchor="middle" filter="url(#shadow)">♠</text>
  <!-- 顶部装饰小字 -->
  <text x="64" y="34" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#e8c84a" text-anchor="middle" letter-spacing="2">SPIDER</text>
</svg>